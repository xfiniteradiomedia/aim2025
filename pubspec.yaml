name: aim2025
description: "A modern reboot of AOL Instant Messenger (AIM) for 2025, built in Flutter."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  firebase_core: ^2.30.0
  firebase_auth: ^4.19.0
  cloud_firestore: ^4.17.0
  firebase_storage: ^12.8.0
  firebase_messaging: ^14.8.0
  google_fonts: ^6.2.0
  shared_preferences: ^2.2.2
  flutter_spinkit: ^5.2.0
  emoji_picker_flutter: ^1.6.0
  image_picker: ^1.0.7
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png